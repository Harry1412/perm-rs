name: 'Set version from git tag'
description: 'Patches Cargo.toml with the version from the current git tag'
runs:
  using: composite
  steps:
    - name: Patch Cargo.toml
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
        rm -f Cargo.toml.bak