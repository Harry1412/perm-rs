name: Update

on:
  release:
    types: [published]

  workflow_dispatch:

jobs:
  update_citation:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v5
      with:
        token: ${{ secrets.PAT }}
        ref: main

    - uses: ./.github/actions/set-version

    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: Update cargo version
        