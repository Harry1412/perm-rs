name: Code formatting

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
        
jobs:
  python-formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13

      - name: Install dependencies
        run: | 
            uv venv
            uv pip install -r requirements.txt

      - name: Check formatting with ruff
        run: uv run ruff check

      - name: Check typing in Python with mypy
        run: uv run mypy

  rust-formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build

      - name: Check formatting
        run: cargo fmt --check

      - name: Check clippy
        run: cargo clippy